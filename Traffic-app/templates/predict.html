<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Traffic Prediction</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body data-theme="dark">

    <!-- NAVBAR -->
    <div class="top-nav">
        <div class="logo">Traffic<span>AI</span></div>

        <nav>
            <a href="/">Home</a>
            <a href="/predict" class="active">Predict</a>
            <a href="/map">Map</a>
            <a href="/upload">Detect</a>
            <a href="/influence">Influence</a>
        </nav>
    </div>

    <div class="container">

        <h1>Traffic Predictions</h1>

        <!-- HYBRID PREDICTION CARD -->
        <div class="card">
            <h2>Hybrid GAT-LSTM • Multi-Road Prediction</h2>

            <div class="form-grid">

                <div>
                    <label>Date:</label>
                    <input type="date" id="hybrid-date">
                </div>
                <div>
                    <label>Time:</label>
                    <input id="time_input" type="time" value="10:00">
                </div>
                <div>
                    <label>Scenario:</label>
                    <select id="hybrid-scenario">
                        <option value="normal">Normal</option>
                        <option value="rain">Rain</option>
                        <option value="event">Event</option>
                    </select>
                </div>

            </div>

            <button id="hybrid-btn" class="btn primary" style="margin-top: 1rem;">
                Predict
            </button>

            <pre id="hybrid-result" class="result-box"></pre>
        </div>

        <!-- PPO CARD -->
        <div class="card">
            <h2>PPO Best Route</h2>

            <div class="form-grid">
                <div>
                    <label>Start Edge:</label>
                    <input type="number" id="ppo-start" min="0" max="29">
                </div>

                <div>
                    <label>End Edge:</label>
                    <input type="number" id="ppo-end" min="0" max="29">
                </div>
            </div>

            <button id="ppo-btn" class="btn secondary" style="margin-top: 1rem;">
                Recommend Route
            </button>

            <pre id="ppo-result" class="result-box"></pre>
        </div>

    </div>

    <script src="/static/js/predict.js"></script>
</body>
</html>
